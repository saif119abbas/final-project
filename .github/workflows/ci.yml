name: ci

on:
  pull_request:
    branches: 
      - main
      - dev

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
      
      - name: Clean Volumes
        run: docker compose down -v

      - name: Run Database
        run: docker compose up postgres -d

      - name: Run Migration
        run: docker compose up migrate

      - name: Run RabbitMQ
        run: docker compose up rabbitmq -d
      
      - name: Run Tests
        run: npm run test

  Style:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run fromat checking 
        run: npm run format:check

      - name: Check linting
        run: npm run lint -- --max-warnings=0