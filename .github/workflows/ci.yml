name: ci

on:
  pull_request:
    branches: 
      - main
      - dev

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zapier_clone
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Run migrations
        run: npx drizzle-kit migrate
        env:
          DB_URL: postgresql://postgres:postgres@localhost:5433/zapier_clone

      - name: Run Tests
        run: npm run test
        env:
          TEST_DB_URL: postgresql://postgres:postgres@localhost:5433/zapier_clone
          RABBITMQ_URL: amqp://guest:guest@localhost:5672

  style:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Run format checking
        run: npm run format:check

      - name: Check linting
        run: npm run lint -- --max-warnings=0