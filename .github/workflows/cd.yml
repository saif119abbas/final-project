name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build code
        run: npm run build

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_DEV_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Test gcloud
        run: gcloud info

        
      - name: Build notely image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/authentic-wharf-489916-k2/final-project-ar-repo/backend:latest .
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely \
          --image us-central1-docker.pkg.dev/authentic-wharf-489916-k2/final-project-ar-repo/backend:latest \
          --region us-central1 \
          --allow-unauthenticated \
          --project authentic-wharf-489916-k2 \
          --max-instances=4
