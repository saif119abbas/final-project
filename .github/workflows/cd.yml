name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DB_URL: ${{ secrets.DB_URL }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build code
        run: npm run build

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_DEV_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Test gcloud
        run: gcloud info

      - name: Build and Push Images
        run: gcloud builds submit --config cloudbuild.yaml .

      - name: Run Migrations
       # run: npm run migrate
        run: |
          gcloud run jobs execute migrate \
          --region us-central1 \
          --project authentic-wharf-489916-k2 \
          #--wait

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy api \
            --image us-central1-docker.pkg.dev/authentic-wharf-489916-k2/zapier-clone-ar-repo/api:latest \
            --region us-central1 \
            --project authentic-wharf-489916-k2 \
            --allow-unauthenticated \
            --max-instances=10 \
            --min-instances=1 \
            --service-account=api-sa@authentic-wharf-489916-k2.iam.gserviceaccount.com

      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy worker \
            --image us-central1-docker.pkg.dev/authentic-wharf-489916-k2/zapier-clone-ar-repo/worker:latest \
            --region us-central1 \
            --project authentic-wharf-489916-k2 \
            --no-allow-unauthenticated \
            --max-instances=5 \
            --min-instances=1 \
            --service-account=worker-sa@authentic-wharf-489916-k2.iam.gserviceaccount.com